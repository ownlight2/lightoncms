[build]
  command = "npm run build"
  publish = "public"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/"
  to = "/cms/index.html"
  status = 200

[[redirects]]
  from = "/cms"
  to = "/cms/index.html"
  status = 200

[[redirects]]
  from = "/cms/"
  to = "/cms/index.html"
  status = 200

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/cms-api/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/cms/index.html"
  status = 200
